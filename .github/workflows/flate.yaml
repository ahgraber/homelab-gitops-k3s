---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches:
      - main
    paths:
      - kubernetes/**/*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Flate - Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Flate
        uses: home-operations/flate/action@c2544f569380e766ef665abc7af685331c881117 # v0.4.11
        with:
          cache: "true"
          version: 0.4.10

      - name: Test Flux resources
        run: flate test all --path ./kubernetes/flux/cluster
