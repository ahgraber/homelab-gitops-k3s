      - any-glob-to-any-file: ansible/**/*
area/docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**/*"
          - "README.md"
area/github:
  - changed-files:
      - any-glob-to-any-file: .github/**/*
area/kubernetes:
  - changed-files:
      - any-glob-to-any-file: kubernetes/**/*
area/automation:
  - changed-files:
      - any-glob-to-any-file: .just/**/*
      - any-glob-to-any-file: .justfile
      - any-glob-to-any-file: "**/*.just"
