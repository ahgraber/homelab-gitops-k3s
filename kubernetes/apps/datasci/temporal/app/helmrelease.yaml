---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app temporal
spec:
  chart:
    spec:
      chart: *app
      version: 1.1.1
      sourceRef:
        kind: HelmRepository
        name: *app
  interval: 1h
  values:
    server:
      config:
        persistence:
          defaultStore: default
          visibilityStore: visibility
          numHistoryShards: 512
          datastores:
            default:
              sql:
                pluginName: postgres12
                connectAddr: &pgAddr "datasci16-rw.datasci.svc.cluster.local:5432"
                connectProtocol: "tcp"
                createDatabase: false
                existingSecret: database-temporal
                secretKey: PASSWORD
            visibility:
              sql:
                pluginName: postgres12
                connectAddr: *pgAddr
                connectProtocol: "tcp"
                createDatabase: false
                existingSecret: database-temporal-visibility
                secretKey: PASSWORD
    schema:
      useHelmHooks: false
    shims:
      dockerize: false
      elasticsearchTool: false
  valuesFrom:
    - kind: Secret
      name: database-temporal
      valuesKey: DATABASE_NAME
      targetPath: server.config.persistence.datastores.default.sql.databaseName
    - kind: Secret
      name: database-temporal
      valuesKey: LOGIN
      targetPath: server.config.persistence.datastores.default.sql.user
    - kind: Secret
      name: database-temporal-visibility
      valuesKey: DATABASE_NAME
      targetPath: server.config.persistence.datastores.visibility.sql.databaseName
    - kind: Secret
      name: database-temporal-visibility
      valuesKey: LOGIN
      targetPath: server.config.persistence.datastores.visibility.sql.user
