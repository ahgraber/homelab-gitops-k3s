---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cloudflared
spec:
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-dns
      namespace: network
  path: ./kubernetes/apps/network/cloudflared/app
  # NOTE: the `cloudflared-tunnel` bootstrap secret must exist before this
  # kustomization reconciles — it provides ${TUNNEL_ID} for postBuild
  # substitution (appended to substituteFrom by the flux-cluster parent patch).
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  wait: true
