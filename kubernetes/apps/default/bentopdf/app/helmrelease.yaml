---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bentopdf
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        # image runs as the built-in "nginx" user (uid/gid 101, nginx-unprivileged)
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

    controllers:
      bentopdf:
        containers:
          app:
            image:
              # self-host build: all tools, no marketing chrome
              repository: ghcr.io/alam00000/bentopdf-simple
              tag: v2.8.6@sha256:1a947a9d4ae515be27b381a2a1f8565d5fa33087c32abc2bb7a6754f83e95f4c
            env:
              TZ: "America/New_York"
            resources:
              requests:
                cpu: 25m
                memory: 64M
              limits:
                memory: 128M
            securityContext:
              allowPrivilegeEscalation: false
              # NOT read-only: the bundled nginx entrypoint writes its pid to
              # /etc/nginx/tmp and rewrites /etc/nginx/conf.d/default.conf at
              # startup (envsubst, ipv6 disable). The image isn't built for a
              # read-only rootfs; non-root uid 101 + dropped caps remain.
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8080
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: *port
