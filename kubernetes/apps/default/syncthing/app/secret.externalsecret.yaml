---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name syncthing-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        username: '{{ index . "username" }}'
        password: '{{ index . "password" }}'
        apiKey: '{{ index . "apiKey" }}'
  dataFrom:
    - extract:
        # op://homelab/default.syncthing/{username,password,apiKey}
        key: "default.syncthing"
