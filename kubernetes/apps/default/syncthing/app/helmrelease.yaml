---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app syncthing
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    controllers:
      syncthing:
        initContainers:
          # Seeds config.xml (creating it on first boot), sets GUI credentials, and
          # enforces local-only discovery — all before the main container starts, so
          # there is never an unauthenticated window. Uses the syncthing binary itself
          # to hash the password (bcrypt), avoiding fragile XML surgery for auth.
          config-init:
            image:
              repository: syncthing/syncthing
              tag: 2.1.1@sha256:775c4aac486263ca8653055bba7d3061799281974b706695e17bc798da3f4e92
            env:
              SYNCTHING_GUI_USER:
                valueFrom:
                  secretKeyRef:
                    name: syncthing-secret
                    key: username
              SYNCTHING_GUI_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: syncthing-secret
                    key: password
            command:
              - /bin/sh
              - -ec
              - |
                # Must match the image's STHOMEDIR (/var/syncthing/config); the main
                # container reads its config from here, not from /var/syncthing.
                config_dir=/var/syncthing/config
                config_file="$config_dir/config.xml"

                # Create/validate config, cert, and device ID, and (re)apply GUI auth.
                # Idempotent: existing cert/device ID are preserved across restarts.
                printf '%s' "$SYNCTHING_GUI_PASSWORD" | syncthing generate \
                  --home="$config_dir" \
                  --gui-user="$SYNCTHING_GUI_USER" \
                  --gui-password=-

                set_option() {
                  key="$1"
                  value="$2"

                  if grep -q "<$key>.*</$key>" "$config_file"; then
                    sed -i "s#<$key>[^<]*</$key>#<$key>$value</$key>#g" "$config_file"
                  elif grep -q "</options>" "$config_file"; then
                    sed -i "s#</options>#  <$key>$value</$key>\n</options>#g" "$config_file"
                  fi
                }

                set_option globalAnnounceEnabled false
                set_option relaysEnabled false
                set_option natEnabled false
                set_option localAnnounceEnabled true

                echo "Seeded Syncthing config with GUI auth and local-only discovery options."
        containers:
          app:
            image:
              repository: syncthing/syncthing
              tag: 2.1.1@sha256:775c4aac486263ca8653055bba7d3061799281974b706695e17bc798da3f4e92
            env:
              PUID: "1000"
              PGID: "1000"
              # Deterministic REST/GUI API key (overrides config.xml at runtime)
              STGUIAPIKEY:
                valueFrom:
                  secretKeyRef:
                    name: syncthing-secret
                    key: apiKey
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/noauth/health
                    port: 8384
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              # allowPrivilegeEscalation: false
              # readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 15m
                memory: 249Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        # runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8384
      discovery:
        enabled: true
        controller: *app
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.2.118.6
          external-dns.alpha.kubernetes.io/hostname: sync.${SECRET_DOMAIN}
        # Keep Cluster: with Cilium L2, the ARP-responder node can differ from the
        # pod node, so Local would blackhole traffic to the LB IP.
        externalTrafficPolicy: Cluster
        ports:
          discovery:
            enabled: true
            port: 21027
            protocol: UDP
          listen:
            enabled: true
            port: 22000
            protocol: TCP
          listen-udp:
            enabled: true
            port: 22000
            protocol: UDP
    route:
      app:
        hostnames:
          - &host syncthing.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: 8384

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /var/syncthing
