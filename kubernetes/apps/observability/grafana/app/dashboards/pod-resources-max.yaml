---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pod-resources-max
spec:
  # Custom in-repo dashboard. Loaded from the raw GitHub URL (resolves on `main`
  # after merge); the JSON lives alongside this CR in ./pod-resources-max.json.
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  url: https://raw.githubusercontent.com/ahgraber/homelab-gitops-k3s/main/kubernetes/apps/observability/grafana/app/dashboards/pod-resources-max.json
