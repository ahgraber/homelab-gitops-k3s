---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    ## ref: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
    crds:
      enabled: true
      upgradeJob:
        enabled: true
        forceConflicts: true

    # fullnameOverride: kps
    cleanPrometheusOperatorObjectNames: true

    alertmanager:
      enabled: true
      fullnameOverride: alertmanager
      alertmanagerSpec:
        alertmanagerConfiguration:
          name: alertmanager
          global:
            resolveTimeout: 5m
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 1Gi
      # config:  # see alertmanager.yaml configmap
      ingress:
        enabled: false
      route:
        alertmanager:
          enabled: true
          hostnames:
            - alertmanager.${SECRET_DOMAIN}
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: alertmanager
                  port: 9093

    grafana:
      enabled: false # manage by itself
      # forceDeployDashboards disabled: the chart ships dashboards as sidecar-labeled
      # ConfigMaps, which grafana-operator does not load. Dashboards are managed as
      # GrafanaDashboard CRs under apps/observability/grafana/app/dashboards.
      forceDeployDashboards: false
    additionalPrometheusRulesMap:
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: Kubernetes cluster Dockerhub rate limit risk
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
    # coreDns:
    #   enabled: false
    kubelet:
      serviceMonitor:
        metricRelabelings:
          # Rename 'name' label to 'container' for Freelens compatibility
          - action: replace
            sourceLabels: [name]
            targetLabel: container
          # Drop high-cardinality labels
          - action: labeldrop
            regex: (uid|id|name|pod_uid|interface)
          # Remove service label to ensure RHS sums collapse duplicates
          - action: labeldrop
            regex: ^service$
          - action: drop
            sourceLabels: ["__name__"]
            regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
          # Drop rarely-used kubelet/storage latency histograms (/metrics endpoint)
          - action: drop
            sourceLabels: ["__name__"]
            regex: (kubelet_.*|storage_operation)_duration_seconds_bucket
        probesMetricRelabelings:
          # Drop probe latency histogram buckets (/metrics/probes endpoint)
          - action: drop
            sourceLabels: ["__name__"]
            regex: prober_probe_duration_seconds_bucket
        # Setting cAdvisorMetricRelabelings replaces the chart default entirely,
        # so the chart's default drops are reproduced here first, then the
        # high-cardinality / restart-churning labels are dropped LAST (after the
        # default rules that still need `interface`/`id` to match).
        cAdvisorMetricRelabelings:
          # --- chart defaults (kube-prometheus-stack 87.2.1) ---
          - action: drop
            sourceLabels: [__name__]
            regex: container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)
          - action: drop
            sourceLabels: [__name__]
            regex: container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)
          - action: drop
            sourceLabels: [__name__]
            regex: container_memory_(mapped_file|swap)
          - action: drop
            sourceLabels: [__name__]
            regex: container_(file_descriptors|tasks_state|threads_max)
          - action: drop
            sourceLabels: [__name__, scope]
            regex: container_memory_failures_total;hierarchy
          - action: drop
            sourceLabels: [__name__, interface]
            regex: container_network_.*;(cali|cilium|cni|lxc|nodelocaldns|tunl).*
          - action: drop
            sourceLabels: [__name__]
            regex: container_spec.*
          - action: drop
            sourceLabels: [id, pod]
            regex: .+;
          # --- custom: drop high-card / restart-churn labels on cadvisor ---
          # Keep `image` — the DockerhubRateLimitRisk alert filters on it.
          - action: labeldrop
            regex: (id|name|interface)
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            sourceLabels: ["__name__"]
            regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
          - action: drop
            sourceLabels: ["__name__"]
            regex: apiserver_(response|watch_events)_sizes_bucket
          - action: drop
            sourceLabels: ["__name__"]
            regex: apiserver_request_body_size_bytes_bucket
          - action: drop
            sourceLabels: ["__name__"]
            regex: workqueue_(work|queue)_duration_seconds_bucket
          - action: drop
            sourceLabels: ["__name__"]
            # Defensively catch any remaining API server histogram buckets
            regex: apiserver_.*_bucket
        selector:
          k8s-app: kube-apiserver
    kubeControllerManager:
      enabled: true
      endpoints: &cm
        - 10.2.118.23
        - 10.2.118.24
        - 10.2.118.25
      serviceMonitor: &sm
        metricRelabelings:
          # k3s re-exposes the apiserver/etcd metric registry on the scheduler &
          # controller-manager ports; drop the redundant high-cardinality histograms
          # (already dropped on kubeApiServer — keeps _sum/_count for rates).
          - action: drop
            sourceLabels: ["__name__"]
            regex: (apiserver|etcd|rest_client)_.*_bucket
          - action: drop
            sourceLabels: ["__name__"]
            regex: workqueue_(work|queue)_duration_seconds_bucket
      # service:
      #   selector:
      #     k8s-app: kube-controller-manager
    kubeEtcd:
      enabled: true
      endpoints: *cm
      service:
        selector:
          component: kube-apiserver # etcd runs on control plane nodes
      serviceMonitor:
        metricRelabelings:
          - action: drop
            sourceLabels: ["__name__"]
            # Trim large etcd histograms that offer little operational value
            regex: etcd_.*_bucket
    kubeProxy:
      enabled: false
    kubeScheduler:
      endpoints: *cm
      serviceMonitor: *sm
    kubeStateMetrics:
      enabled: true
      # config specified in kube-state-metrics.yaml configmap
      fullnameOverride: kube-state-metrics
      metricLabelsAllowlist:
        # Narrowed from [*]: excludes churny labels (pod-template-hash,
        # controller-revision-hash, job-name) that mint new kube_*_labels series
        # on every rollout.
        - pods=[app,app.kubernetes.io/name,app.kubernetes.io/instance,app.kubernetes.io/component,app.kubernetes.io/part-of]
        - deployments=[app.kubernetes.io/name,app.kubernetes.io/instance]
        - persistentvolumeclaims=[app.kubernetes.io/name,app.kubernetes.io/instance]
      prometheus:
        monitor:
          enabled: true
          metricRelabelings:
            # Drop per-secret KSM series (high-cardinality 'secret' label, low value)
            - action: drop
              sourceLabels: ["__name__"]
              regex: kube_secret_.*
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: kubernetes_node
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: node
    nodeExporter:
      enabled: true
    prometheus-node-exporter:
      fullnameOverride: node-exporter
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: kubernetes_node
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: node
          metricRelabelings:
            # Drop bogus WMI/ACPI temp series defensively at scrape time
            - action: drop
              sourceLabels: [__name__, chip]
              regex: node_hwmon_temp_celsius;wmi_bus_.*

    prometheusOperator:
      resources:
        requests:
          cpu: 35m
          memory: 273M
        limits:
          memory: 326M
      prometheusConfigReloader:
        # resource config for prometheusConfigReloader
        resources:
          requests:
            cpu: 5m
            memory: 32M
          limits:
            memory: 32M
    prometheus:
      enabled: true
      fullNameOverride: prometheus
      ingress:
        enabled: false
      route:
        prometheus:
          enabled: true
          hostnames:
            - &host prometheus.${SECRET_DOMAIN}
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: prometheus
                  port: 9090
      prometheusSpec:
        # additionalScrapeConfigsSecret:
        #   enabled: true
        #   name: prometheus-additional-scrape-configs
        #   key: additionalScrapeConfigs
        scrapeConfigSelector:
          matchLabels:
            prometheus: kube-prometheus-stack
        scrapeConfigNamespaceSelector:
          matchNames:
            - observability
        scrapeInterval: 30s # Must match interval in Grafana Helm chart
        enableAdminAPI: true
        externalLabels:
          cluster: flux-system
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableFeatures:
          - auto-gomemlimit
          - memory-snapshot-on-shutdown
          - new-service-discovery-manager
        resources:
          requests:
            cpu: 512m
            memory: 1Gi
          limits:
            memory: 4Gi
        retention: 5d
        retentionSize: 20GiB # ~80% of the 25Gi PVC; leaves headroom for WAL + compaction
        walCompression: true
        persistentVolumeClaimRetentionPolicy:
          whenDeleted: Delete
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 25Gi
