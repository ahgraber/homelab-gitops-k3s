---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app redisinsight
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths:
          - /spec/containers/resources/limits
        target:
          kind: Pod
  values:
    defaultPodOptions:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

    controllers:
      redisinsight:
        annotations:
          reloader.stakater.com/search: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: redis/redisinsight
              tag: 2.70.0@sha256:d9f6c54d4a3dcfcdfd54659bd88b66ae883251cea0f6e73ae70ed74811f227f5
            env:
              - name: RI_FILES_LOGGER
                value: "false"
              - name: RI_STDOUT_LOGGER
                value: "true"
            resources:
              requests:
                cpu: 25m
                memory: 127M
              limits:
                memory: 378M
            securityContext:
              allowPrivilegeEscalation: false
              # readOnlyRootFilesystem: true
              capabilities: { drop: [ALL] }
        serviceAccount:
          identifier: *app

    serviceAccount:
      create: true
      redisinsight: {}
    service:
      app:
        # name should not be 'redisinsight'  since the service creates environment variables
        # that conflicts with redisinsight application's environment variables:
        # `REDISINSIGHT_HOST` and `REDISINSIGHT_PORT`
        suffix: svc
        controller: *app
        ports:
          http:
            port: &port 5540

    route:
      app:
        hostnames: ["redisinsight.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
