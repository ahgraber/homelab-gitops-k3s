---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name pgadmin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        DEFAULT_DB_USERNAME: '{{ index . "username" }}'
        DATASCI_DB_USERNAME: '{{ index . "username" }}'
        PASSWORD: '{{ index . "password" }}'
        servers.json: |
          {
            "Servers": {
              "default": {
                "Name": "default",
                "Group": "Servers",
                "Host": "postgres16-rw.database.svc.cluster.local",
                "Port": 5432,
                "Username": "{{ index . \"username\" }}",
                "SSLMode": "prefer",
                "MaintenanceDB": "postgres"
              },
              "datasci": {
                "Name": "datasci",
                "Group": "Servers",
                "Host": "datasci16-rw.datasci.svc.cluster.local",
                "Port": 5432,
                "Username": "{{ index . \"username\" }}",
                "SSLMode": "prefer",
                "MaintenanceDB": "postgres"
              }
            }
          }
  dataFrom:
    - extract:
        # all available properties from the key will be synced
        key: "database.pgadmin"
