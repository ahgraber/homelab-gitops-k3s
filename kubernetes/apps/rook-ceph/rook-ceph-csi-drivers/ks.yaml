---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app rook-ceph-csi-drivers
spec:
  targetNamespace: rook-ceph
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  # Requires the ceph-csi-operator CRDs (Driver, OperatorConfig, CephConnection,
  # ClientProfile) installed by the rook-ceph operator chart's subchart.
  dependsOn:
    - name: rook-ceph-operator
      namespace: rook-ceph
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: rook-ceph-csi-drivers
      namespace: rook-ceph
  path: ./kubernetes/apps/rook-ceph/rook-ceph-csi-drivers/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 1h
  wait: true
