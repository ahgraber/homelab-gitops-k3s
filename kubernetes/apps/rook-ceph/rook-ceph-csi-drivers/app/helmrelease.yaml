---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rook-ceph-csi-drivers
spec:
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.3
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
  interval: 1h
  values:
    operatorConfig:
      # MUST match the rook-ceph operator namespace so the ceph-csi-operator
      # reconciles the Driver CRs created by this chart.
      namespace: rook-ceph
      driverSpecDefaults:
        # Rook supplies the CSI sidecar/cephcsi images via the operator chart's
        # image-set ConfigMap; reference it so images stay in lockstep with Rook.
        imageSet:
          name: rook-csi-operator-image-set-configmap
        nodePlugin:
          priorityClassName: system-node-critical
          # Migrated from operator chart `csi.kubeletDirPath`.
          kubeletDirPath: /var/lib/kubelet
          # Migrated from operator chart `csi.pluginTolerations`: the node plugin
          # DaemonSet must run on every node that mounts Ceph volumes.
          tolerations:
            - effect: NoExecute
              operator: Exists
            - effect: NoSchedule
              operator: Exists
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
        controllerPlugin:
          priorityClassName: system-cluster-critical
          # Migrated from operator chart `csi.provisionerTolerations`: keep the
          # provisioner co-located with the Ceph daemons on the control-plane.
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists

    drivers:
      rbd:
        enabled: true
        # Driver name MUST keep the `rook-ceph.` (operator namespace) prefix so it
        # matches existing PV `spec.csi.driver` values and the StorageClass
        # provisioner names. Changing this orphans all existing volumes.
        name: rook-ceph.rbd.csi.ceph.com
        # The ceph-csi-drivers chart defaults `drivers.rbd.snapshotPolicy` to
        # `none`, which omits the csi-snapshotter sidecar from the RBD
        # controllerPlugin. The old Rook-operator-managed CSI enabled the
        # snapshotter by default, so the v1.20 split silently broke RBD
        # VolumeSnapshots (VolSync backups hang at readyToUse: false forever).
        # Restore parity with the cephfs driver (which defaults to volumeSnapshot).
        snapshotPolicy: volumeSnapshot
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
        # Migrated from operator chart `csi.cephFSKernelMountOptions: ms_mode=crc`.
        # Required because the cluster enforces msgr2 (requireMsgr2: true).
        kernelMountOptions:
          ms_mode: crc
      nfs:
        enabled: false
        name: rook-ceph.nfs.csi.ceph.com
      nvmeof:
        enabled: false
        name: rook-ceph.nvmeof.csi.ceph.com
