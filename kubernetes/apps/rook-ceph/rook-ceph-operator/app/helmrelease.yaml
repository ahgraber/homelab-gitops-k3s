---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rook-ceph-operator
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  interval: 1h
  values:
    crds:
      enabled: true
    monitoring:
      enabled: true
      createPrometheusRules: true

    # resources:
    #   requests:
    #     cpu: 100m
    #     memory: 128Mi
    #   limits:
    #     memory: 256Mi

    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists

    # NOTE (Rook v1.20): CSI drivers are no longer deployed by Rook. The operator
    # chart only installs the ceph-csi-operator subchart (controller + CRDs) when
    # `csi.installCsiOperator` is true (default). The actual RBD/CephFS driver pods
    # and their tunables (tolerations, kubeletDirPath, mount options, etc.) are now
    # managed by the separate `ceph-csi-drivers` HelmRelease in this namespace.
    csi:
      # Install the bundled ceph-csi-operator subchart (manages CSI driver CRs).
      installCsiOperator: true
      serviceMonitor:
        enabled: true

    enableDiscoveryDaemon: true
    discover:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
