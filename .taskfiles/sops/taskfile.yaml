---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  SOPS_CONFIG_FILE: "{{ .ROOT_DIR }}/.sops.yaml"

tasks:

  age-keygen:
    desc: Initialize Age Key for Sops
    cmd: age-keygen --output {{ .AGE_FILE }}
    status:
      - test -f "{{ .AGE_FILE }}"

  encode:
    desc: Substitute and encrypt sops secret, given template
    summary: |
      Args:
        tmpl: Path to the template file (./*/*.sops.yaml.tmpl)
    cmds:
      - |
        unset noclobber
        envsubst < {{ .tmpl }} > {{ .tmpl | replace ".tmpl" ""}}
        sops --encrypt --in-place {{ .tmpl | replace ".tmpl" ""}}
    requires:
      vars: ["tmpl"]
    preconditions:
      - { msg: "Missing Sops config file", sh: "test -f {{ .SOPS_CONFIG_FILE }}" }
      - { msg: "Missing Sops Age key file", sh: "test -f {{ .AGE_FILE }}" }
      - { msg: "File is not a template", sh: '{{ if not (.tmpl | contains ".sops.yaml.tmpl") }}exit 1;{{ end }}'}

  encrypt-all:
    desc: Encrypt all Kubernetes SOPS secrets that are not already encrypted
    cmds:
      - for: { var: file }
        task: .encrypt-file
        vars:
          file: "{{ .ITEM }}"
    vars:
      file:
        sh: |
          if [ -d "{{ .KUBERNETES_DIR }}" ]; then
              find "{{ .KUBERNETES_DIR }}" -type f -name "*.sops.*" -exec grep -L "ENC\[AES256_GCM" {} \;
          fi

  .encrypt-file:
    internal: true
    cmd: sops --encrypt --in-place {{ .file }}
    requires:
      vars: ["file"]
    preconditions:
      - { msg: "Missing Sops config file", sh: "test -f {{ .SOPS_CONFIG_FILE }}" }
      - { msg: "Missing Sops Age key file", sh: "test -f {{ .AGE_FILE }}" }

  sops-updatekeys:
    desc: Re-key every sops file to the current .sops.yaml recipients (keeps data key, minimal diff)
    summary: |
      Run after adding/removing a host or user recipient in .sops.yaml.
      Re-wraps each file's data key for the current recipient set without changing
      encrypted values. You must be a current recipient of each file to re-key it.
      For a compromised/rotated key use `task nix:sops-rotate` instead.
    cmds:
      - cmd: |
          find . -type f \( \
            -name '*.sops.yaml' -o -name '*.sops.yml' -o \
            -name '*.sops.json' -o -name '*.sops.env' -o -name '*.sops.ini' \
          \) -exec sops updatekeys {} \;

  sops-rotate:
    desc: Re-key every sops file, then rotate data keys and re-encrypt all values
    summary: |
      First syncs each file's recipients to the current .sops.yaml, removing stale
      recipients, then generates a fresh data key per file and re-encrypts every
      value. Produces large diffs; only needed when a recipient key may have been
      exposed or on a scheduled rotation. For routine recipient changes use
      `task nix:sops-updatekeys`.
    prompt: Rotate data keys for ALL sops files? This re-encrypts every value.
    cmds:
      - cmd: |
          find . -type f \( \
            -name '*.sops.yaml' -o -name '*.sops.yml' -o \
            -name '*.sops.json' -o -name '*.sops.env' -o -name '*.sops.ini' \
          \) -exec sops updatekeys -y {} \; -exec sops rotate -i {} \;
